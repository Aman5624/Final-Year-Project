<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page - Nagaram</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/newcss/index.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-section">
        <img src="static/newcss/drone image.png" alt="Drone Image" />
        <h1>ONLINE MONITORING OF CONSTRUCTION</h1>
        <img class="building" src="static/newcss/building.png" alt="Drone Image" />
      </div>
      <div class="right-section login-form">
        <h2>Login</h2>
        <form action="{{ url_for('login') }}" method="POST">
          <div class="input-container">
            <input
              type="text"
              name="username"
              placeholder="Username"
              required
            />
            <i class="icon-user"></i>
          </div>
          <div class="input-container">
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />
            <i class="icon-lock"></i>
          </div>
          <div class="extras">
            <label><input type="checkbox" name="remember" /> Remember me</label>
            <a href="/forgot-password">Forgot password?</a>
          </div>
          <button type="submit" class="login-btn">Login</button>
        </form>
        <p>
          Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </p>
      </div>
    </div>
  </body>
</html>
