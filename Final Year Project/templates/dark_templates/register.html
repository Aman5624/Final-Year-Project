<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Page - Nagaram</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/newcss/index.css" />
  </head>
  <body>
    <div class="container">
      <div class="left-section">
          <img src="static/newcss/drone image.png" alt="Drone Image" />
        <h1>ONLINE MONITORING OF CONSTRUCTION</h1>
        <img src="static/newcss/building.png" alt="Drone Image" />
      </div>
      <div class="right-section register-form">
        <h2>Register</h2>
        <form action="{{ url_for('register') }}" method="POST">
          <div class="input-container">
            <input
              type="text"
              name="fullname"
              placeholder="Fullname"
              required
            />

          </div>
          <div class="input-container">
            <input
              type="text"
              name="username"
              placeholder="Username"
              required
            />

          </div>
          <div class="input-container">
            <input
              type="email"
              name="email"
              placeholder="Email"
              required
            />

          </div>
          <div class="input-container">
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />

          </div>
          <div class="input-container">
            <input
              type="password"
              name="confirm_password"
              placeholder="Confirm Password"
              required
            />

          </div>
          <button type="submit" class="register-btn">Register</button>
        </form>
        <p>
          Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
      </div>
    </div>
  </body>
</html>
